<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Antenna stem -->
  <line x1="32" y1="8" x2="32" y2="16" stroke="#005ca9" stroke-width="3" stroke-linecap="round"/>
  <!-- Antenna tip (gold) -->
  <circle cx="32" cy="6" r="4" fill="#c2a712"/>
  <!-- Head -->
  <rect x="8" y="16" width="48" height="40" rx="10" fill="#005ca9"/>
  <!-- Left eye -->
  <circle cx="24" cy="36" r="6" fill="#ffffff"/>
  <circle cx="24" cy="36" r="3" fill="#c2a712"/>
  <!-- Right eye -->
  <circle cx="40" cy="36" r="6" fill="#ffffff"/>
  <circle cx="40" cy="36" r="3" fill="#c2a712"/>
  <!-- Mouth -->
  <rect x="22" y="46" width="20" height="3" rx="1.5" fill="#ffffff" opacity="0.6"/>
</svg>
