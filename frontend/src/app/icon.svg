<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Antenna stem -->
  <line x1="16" y1="4" x2="16" y2="8" stroke="#005ca9" stroke-width="2" stroke-linecap="round"/>
  <!-- Antenna tip -->
  <circle cx="16" cy="3" r="2" fill="#c2a712"/>
  <!-- Head -->
  <rect x="4" y="8" width="24" height="20" rx="5" fill="#005ca9"/>
  <!-- Left eye -->
  <circle cx="12" cy="18" r="3" fill="#ffffff"/>
  <circle cx="12" cy="18" r="1.5" fill="#c2a712"/>
  <!-- Right eye -->
  <circle cx="20" cy="18" r="3" fill="#ffffff"/>
  <circle cx="20" cy="18" r="1.5" fill="#c2a712"/>
  <!-- Mouth -->
  <rect x="11" y="23" width="10" height="2" rx="1" fill="#ffffff" opacity="0.6"/>
</svg>
